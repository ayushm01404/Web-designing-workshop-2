<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Employee Salary Management System</title>

<style>
body{ 
font-family: Arial, sans-serif; 
background: thistle; 
display:flex; 
justify-content:center; 
align-items:center; 
height:100vh; 
}

.container{ 
background:rgb(53, 124, 201); 
padding:40px; 
border-radius:10px; 
width:500px; 
text-align:center; 
box-shadow:0 0 10px rgba(0,0,0,0.2); 
} 

input{ 
width:350px; 
padding:12px; 
margin:10px 0; 
border-radius:5px; 
background-color: bisque; 
font-weight: 800; 
border: 2px solid #ccc; 
} 

button{ 
padding:12px; 
margin:6px; 
border:none; 
background:#1e0dd8; 
color:white; 
border-radius:5px; 
cursor:pointer; 
} 

button:hover{ 
background:#dc0f46; 
} 

#output{ 
margin-top:15px; 
text-align:left; 
}
</style>

</head>

<body>

<div class="container">

<h2>Employee Salary Management System</h2>

<input type="text" id="name" placeholder="Employee Name"> 
<input type="text" id="id" placeholder="Employee ID"> 
<input type="number" id="salary" placeholder="Salary"> 
<input type="text" id="department" placeholder="Department"> 

<button onclick="addEmployee()">Add Employee</button><br> 
<button onclick="displayAll()">Display All</button> 
<button onclick="salaryAbove()">Salary > 50000</button> 
<button onclick="totalSalary()">Total Salary</button> 
<button onclick="averageSalary()">Average Salary</button> 
<button onclick="countDepartment()">Count by Department</button> 

<div id="output"></div> 

</div>

<script>
let employees=[];

function addEmployee(){ 
let name=document.getElementById("name").value; 
let id=document.getElementById("id").value; 
let salary=document.getElementById("salary").value; 
let department=document.getElementById("department").value; 

if(name===""||id===""||salary===""||department===""){ 
alert("Please fill all fields properly"); 
return;  
} 

let employee={ 
name:name, 
id:id, 
salary:Number(salary), 
department:department 
}; 

employees.push(employee); 

alert("Employee "+name+" stored successfully"); 

document.getElementById("name").value=""; 
document.getElementById("id").value=""; 
document.getElementById("salary").value=""; 
document.getElementById("department").value=""; 
} 

function displayAll(){ 
if(employees.length===0){ 
alert("No employees stored"); 
return; 
} 

let output=""; 

employees.forEach(function(emp){ 
output+="Name: "+emp.name+ 
" | ID: "+emp.id+ 
" | Salary: "+emp.salary+ 
" | Department: "+emp.department+"<br>"; 
}); 

document.getElementById("output").innerHTML=output; 
} 

function salaryAbove(){ 
let output=""; 

for(let i=0;i<employees.length;i++){ 
if(employees[i].salary>50000){ 
output+="Name: "+employees[i].name+ 
" | Salary: "+employees[i].salary+"<br>"; 
} 
} 

if(output===""){ 
output="No employees with salary greater than 50000"; 
} 

document.getElementById("output").innerHTML=output; 
} 

function totalSalary(){ 
let total=0; 

for(let i=0;i<employees.length;i++){ 
total+=employees[i].salary; 
} 

document.getElementById("output").innerHTML="Total Salary: "+total; 
} 

function averageSalary(){ 
if(employees.length===0){ 
alert("No employee data available"); 
return; 
} 

let total=0; 

for(let i=0;i<employees.length;i++){ 
total+=employees[i].salary; 
} 

let avg=total/employees.length; 

document.getElementById("output").innerHTML="Average Salary: "+avg.toFixed(2); 
} 

function countDepartment(){ 
let deptCount={}; 

for(let i=0;i<employees.length;i++){ 
let dept=employees[i].department; 

if(deptCount[dept]){ 
deptCount[dept]++; 
} 
else{ 
deptCount[dept]=1; 
} 
} 

let output=""; 

for(let d in deptCount){ 
output+=d+" : "+deptCount[d]+" employees<br>"; 
} 

document.getElementById("output").innerHTML=output; 
} 
</script>

</body>
</html>
