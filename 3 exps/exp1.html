 <!DOCTYPE html> 
<html lang="en"> 
<head> 
<meta charset="UTF-8"> 
<title>JavaScript Lab</title> 
<style> 
body{ 
 font-family: Arial, sans-serif; 
 background: linear-gradient(135deg, #667eea, #764ba2);
 display: flex; 
 justify-content: center; 
 align-items: center; 
 height: 100vh; 
 margin: 0;
} 

.container{ 
 background: rgba(255, 255, 255, 0.15);
 backdrop-filter: blur(10px);
 padding: 30px; 
 border-radius: 15px; 
 box-shadow: 0px 8px 25px rgba(0,0,0,0.3); 
 text-align: center; 
 width: 500px; 
 color: white;
}

input{ 
 padding: 10px; 
 width: 70%; 
 margin: 15px 0; 
 border: none; 
 border-radius: 8px; 
 outline: none;
} 

.buttons{ 
 margin: 10px 0; 
} 

button{ 
 padding: 10px 15px; 
 margin: 5px; 
 border: none; 
 border-radius: 25px; 
 background: linear-gradient(45deg, #ff7e5f, #feb47b);
 color: white; 
 cursor: pointer; 
 transition: all 0.3s ease;
 font-weight: bold;
} 

button:hover{ 
 transform: scale(1.1);
 background: linear-gradient(45deg, #43cea2, #185a9d);
} 

p{ 
 margin-top: 20px; 
 font-size: 16px;
 color: #f1f1f1;
}
 </style> 
</head> 
<body> 
<div class="container"> 
<h1 id="heading">Welcome to JavaScript Lab</h1> 
<input type="text" id="inputText" placeholder="Enter new heading text"> 
<div class="buttons"> 
<button onclick="changeHeading()">Change Heading</button> 
<button onclick="changeBackground()">Change Background</button> 
<button onclick="increaseFont()">Increase Font Size</button> 
</div> 
<div class="buttons"> 
<button onclick="toggleParagraph()">Show/Hide Paragraph</button> 
<button onclick="resetPage()">Reset</button> 
</div> 
<p id="para"> 
This is a sample paragraph. JavaScript events can dynamically change content. 
</p> 
</div> 
<script> 
let fontSize = 16; 
let isVisible = true; 
function changeHeading() { 
 let input = document.getElementById("inputText").value; 
 if (input !== "") {
 document.getElementById("heading").innerText = input; 
 } 
} 
function changeBackground() { 
 document.body.style.backgroundColor = 
 document.body.style.backgroundColor === "lightblue" 
 ? "palegreen" 
 : "lightblue"; 
} 
function increaseFont(){ 
 fontSize += 2; 
 document.getElementById("para").style.fontSize = fontSize + "px"; 
} 
function toggleParagraph(){ 
 let para = document.getElementById("para"); 
 if (isVisible){ 
 para.style.display = "none"; 
 } else { 
 para.style.display = "block"; 
 } 
 isVisible = !isVisible; 
} 
function resetPage(){ 
 document.getElementById("heading").innerText = "Welcome to JavaScript Lab"; 
 document.getElementById("inputText").value = ""; 
 document.body.style.backgroundColor = "#eaeaea"; 
 document.getElementById("para").style.fontSize = "16px";
 document.getElementById("para").style.display = "block";
 fontSize = 16;
 isVisible = true;
}
</script>
</body>
</html>
