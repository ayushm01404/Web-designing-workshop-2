<!DOCTYPE html>
<html>
<head>
<title>Sum of Even Numbers</title>

<style>
body{
    font-family: Arial;
    text-align: center;
    background-color: #f2f2f2;
}

.container{
    background: white;
    width: 300px;
    padding: 20px;
    margin: 100px auto;
    border-radius: 10px;
    box-shadow: 0 0 10px gray;
}

input{
    padding: 8px;
    margin: 10px;
}

button{
    padding: 8px 15px;
    background: blue;
    color: white;
    border: none;
    border-radius: 5px;
}
</style>

<script>
function calculate(){
    let n = document.getElementById("num").value;
    let sum = 0;

    for(let i = 1; i <= n; i++){
        if(i % 2 == 0){
            sum = sum + i;
        }
    }

    document.getElementById("result").innerHTML =
    "Sum of even numbers from 1 to " + n + " is: " + sum;
}
</script>

</head>

<body>

<div class="container">
<h2>Sum of Even Numbers</h2>

<input type="number" id="num" placeholder="Enter a number">

<br><br>

<button onclick="calculate()">Calculate</button>

<h3 id="result"></h3>

</div>

</body>
</html>
